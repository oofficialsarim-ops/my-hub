<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE-HUB | Final Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --gold: linear-gradient(45deg, #d4af37, #f2d06b);
            --card-bg: rgba(20, 20, 20, 0.8);
            --border: rgba(212, 175, 55, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg); 
            color: #fff; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        .container { width: 100%; max-width: 1000px; padding: 30px; text-align: center; }
        
        .header { margin-bottom: 60px; }
        .header h1 { 
            font-size: 4rem; 
            font-weight: 800;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 12px;
            text-transform: uppercase;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2));
        }
        .header p { 
            color: #666; 
            letter-spacing: 5px; 
            font-size: 0.7rem; 
            margin-top: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .nav-cards { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
        }

        .nav-link { text-decoration: none; color: inherit; }

        .nav-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 50px 20px; 
            transition: all 0.5s ease;
            position: relative;
            backdrop-filter: blur(5px);
        }

        .nav-card:hover { 
            border-color: #f2d06b;
            transform: translateY(-15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 15px rgba(212, 175, 55, 0.2);
            background: rgba(30, 30, 30, 0.9);
        }

        .nav-card h2 { 
            font-size: 2rem; 
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .nav-card p { 
            color: #d4af37; 
            font-size: 0.8rem; 
            font-weight: 500;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2.5rem; letter-spacing: 6px; }
            .nav-cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CORE<span>HUB</span></h1>
            <p>Accessing Futuristic Premium Files</p>
        </div>

        <div class="nav-cards">
            <a href="https://filmygod.cloud/" target="_blank" class="nav-link">
                <div class="nav-card">
                    <h2>MOVIES</h2>
                    <p>Enter FilmyGod Database</p>
                </div>
            </a>

            <a href="https://raretoonsindia.rtisite.com/" target="_blank" class="nav-link">
                <div class="nav-card">
                    <h2>ANIME</h2>
                    <p>Rare India Archive</p>
                </div>
            </a>

            <a href="https://oceanofgames.com/" target="_blank" class="nav-link">
                <div class="nav-card">
                    <h2>GAMES</h2>
                    <p>Ultimate Game Vault</p>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
