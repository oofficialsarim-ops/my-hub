<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE-HUB | Future of Downloads</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #00ff88; min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin: 40px 0; }
        .header h1 { font-size: 3rem; text-shadow: 0 0 20px #00ff88; letter-spacing: 5px; }
        .header span { color: #ff00ff; }
        
        .search-bar { width: 100%; max-width: 600px; margin: 0 auto 40px; }
        .search-bar input { width: 100%; padding: 15px 25px; background: #111; border: 2px solid #00ff88; border-radius: 50px; color: #fff; outline: none; box-shadow: 0 0 15px rgba(0,255,136,0.2); }

        .nav-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .nav-card { background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 15px; padding: 30px; text-align: center; cursor: pointer; transition: 0.4s; }
        .nav-card:hover, .nav-card.active { border-color: #00ff88; box-shadow: 0 0 30px rgba(0,255,136,0.3); transform: translateY(-10px); }
        
        .content-section { display: none; animation: fadeIn 0.5s; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .download-item { background: #111; border: 1px solid #222; border-radius: 15px; padding: 20px; transition: 0.3s; }
        .download-item:hover { border-color: #00ff88; }
        .download-item h3 { margin-bottom: 10px; color: #fff; }
        .meta { font-size: 0.9rem; color: #00bfff; margin-bottom: 20px; }
        
        .download-btn { width: 100%; padding: 12px; background: #00ff88; border: none; border-radius: 10px; color: #000; font-weight: bold; cursor: pointer; text-decoration: none; display: block; text-align: center; }
        .download-btn:hover { background: #fff; box-shadow: 0 0 20px #00ff88; }

        @media (max-width: 768px) { .nav-cards { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CORE<span>HUB</span></h1>
            <p>Accessing Futuristic Database...</p>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search for files...">
        </div>

        <div class="nav-cards">
            <div class="nav-card active" onclick="switchTab('movies', this)"><h2>MOVIES</h2></div>
            <div class="nav-card" onclick="switchTab('anime', this)"><h2>ANIME</h2></div>
            <div class="nav-card" onclick="switchTab('games', this)"><h2>GAMES</h2></div>
        </div>

        <div id="movies" class="content-section active"><div class="item-grid" id="moviesGrid"></div></div>
        <div id="anime" class="content-section"><div class="item-grid" id="animeGrid"></div></div>
        <div id="games" class="content-section"><div class="item-grid" id="gamesGrid"></div></div>
    </div>

    <script>
        const DATABASE = {
            movies: [
                { name: "Avatar: Way of Water", info: "1.2 GB | 1080p", link: "#" },
                { name: "The Dark Knight", info: "950 MB | 720p", link: "#" }
            ],
            anime: [
                { name: "Naruto Complete", info: "220 Episodes | HD", link: "#" },
                { name: "Death Note", info: "37 Episodes | 1080p", link: "#" }
            ],
            games: [
                { name: "GTA V Mobile", info: "2.5 GB | Android", link: "#" },
                { name: "PUBG Mod APK", info: "800 MB | Latest", link: "#" }
            ]
        };

        function render(cat) {
            const grid = document.getElementById(cat + 'Grid');
            grid.innerHTML = DATABASE[cat].map(item => `
                <div class="download-item">
                    <h3>${item.name}</h3>
                    <div class="meta">${item.info}</div>
                    <a href="${item.link}" class="download-btn" target="_blank">🚀 DOWNLOAD NOW</a>
                </div>
            `).join('');
        }

        function switchTab(cat, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-card').forEach(c => c.classList.remove('active'));
            document.getElementById(cat).classList.add('active');
            el.classList.add('active');
            render(cat);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const activeCat = document.querySelector('.content-section.active').id;
            const items = DATABASE[activeCat].filter(i => i.name.toLowerCase().includes(term));
            document.getElementById(activeCat + 'Grid').innerHTML = items.map(item => `
                <div class="download-item">
                    <h3>${item.name}</h3>
                    <div class="meta">${item.info}</div>
                    <a href="${item.link}" class="download-btn" target="_blank">🚀 DOWNLOAD NOW</a>
                </div>
            `).join('');
        });

        render('movies');
    </script>
</body>
</html>
